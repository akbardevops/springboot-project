name: spingboot-application
on:
 push:
   branches:
     - main
 pull_request:
    branches:
      - main
env:
 IMAGE_NAME: akbarmohd/webapp
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21 
        uses: actions/setup-java@v4 
        with: 
          distribution: temurin 
          java-version: '21'
      - name: Build Application 
        run: mvn clean package -DskipTests
      - name: Login to Docker Hub 
        uses: docker/login-action@v3 
        with: 
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image 
        run: | 
          docker build -t $IMAGE_NAME:${{ github.run_number }} . 
          docker tag $IMAGE_NAME:${{ github.run_number }} $IMAGE_NAME:latest
      - name: Push Docker Image 
        run: | 
          # docker push $IMAGE_NAME:${{ github.run_number }} 
          docker push $IMAGE_NAME:latest
          # docker stop webapps
          # docker rm webapps
          docker run -d --name webapps -p 8084:8084 $IMAGE_NAME:latest
